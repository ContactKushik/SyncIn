<div class="flex h-screen bg-gray-100">

  <!-- SIDEBAR -->
  @if (sidebarOpen()) {
  <aside class="w-64 bg-white shadow-lg flex flex-col">
    <!-- Logo -->
    <div class="p-6 border-b">
      <h1 class="text-xl font-bold text-blue-600">SyncIn</h1>
      <p class="text-xs text-gray-400 mt-1">{{ role() }} Dashboard</p>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-4 space-y-2">
      @if (role() === 'POC') {
      <a routerLink="/dashboard" class="block px-4 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">
        📋 Cohorts
      </a>
      }
    </nav>

    <!-- User / Logout -->
    <div class="p-4 border-t">
      <div class="text-sm text-gray-500 mb-2">Role: <span class="font-semibold text-gray-700">{{ role() }}</span></div>
      <button (click)="onLogout()"
        class="w-full text-sm text-red-500 hover:text-red-700 font-medium py-2 rounded-lg hover:bg-red-50 transition">
        🚪 Logout
      </button>
    </div>
  </aside>
  }

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top bar -->
    <header class="bg-white shadow-sm px-6 py-3 flex items-center justify-between">
      <button (click)="toggleSidebar()" class="text-gray-500 hover:text-gray-700 text-xl">☰</button>
      <div class="text-sm text-gray-400">SyncIn Platform</div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>
  </div>

</div>
