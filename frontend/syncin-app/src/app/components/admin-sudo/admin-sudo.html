<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">

  <!-- LOGIN FORM -->
  @if (!isLoggedIn()) {
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Admin Login</h1>

    @if (loginError()) {
    <div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-300 rounded p-2 text-center">
      {{ loginError() }}
    </div>
    }

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input [(ngModel)]="loginUsername" type="text" placeholder="Enter username"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input [(ngModel)]="loginPassword" type="password" placeholder="Enter password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <button (click)="onLogin()"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
      Login
    </button>
  </div>
  }

  <!-- CREATE POC FORM -->
  @if (isLoggedIn()) {
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-lg">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Create POC</h1>
      <button (click)="onLogout()" class="text-sm text-red-500 hover:underline">Logout</button>
    </div>

    @if (successMsg()) {
    <div class="mb-4 text-sm text-green-700 bg-green-50 border border-green-300 rounded p-2">
      {{ successMsg() }}
    </div>
    }
    @if (errorMsg()) {
    <div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-300 rounded p-2">
      {{ errorMsg() }}
    </div>
    }

    <div class="grid grid-cols-1 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Employee ID</label>
        <input [(ngModel)]="poc.empId" type="text" placeholder="EMP001"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input [(ngModel)]="poc.name" type="text" placeholder="John Doe"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input [(ngModel)]="poc.email" type="email" placeholder="john@example.com"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mobile No</label>
        <input [(ngModel)]="poc.mobileNo" type="text" placeholder="+91 9876543210"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input [(ngModel)]="poc.passwordHash" type="password" placeholder="Set initial password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>

    <button (click)="onCreatePoc()"
      class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
      Create POC
    </button>
  </div>
  }

</div>
