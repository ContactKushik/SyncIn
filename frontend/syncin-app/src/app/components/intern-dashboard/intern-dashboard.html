<div class="space-y-6">

  <!-- ═══ STATUS CARD ═══ -->
  <div class="bg-white rounded-xl shadow p-6">
    <h2 class="text-lg font-bold text-gray-800 mb-4">Today's Attendance</h2>

    <div class="flex items-center gap-4">
      <div class="w-16 h-16 rounded-full flex items-center justify-center text-2xl"
        [class]="punchedIn() ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-400'">
        {{ punchedIn() ? '✓' : '○' }}
      </div>
      <div>
        <p class="text-sm text-gray-500">{{ todayDate() }}</p>
        <p class="text-xl font-bold" [class]="punchedIn() ? 'text-green-600' : 'text-gray-500'">
          {{ status() }}
        </p>
      </div>
    </div>
  </div>

  <!-- ═══ PUNCH IN SECTION ═══ -->
  @if (!punchedIn()) {
  <div class="bg-white rounded-xl shadow p-6">
    <h2 class="text-lg font-bold text-gray-800 mb-4">Punch In</h2>

    @if (msg()) {
    <div class="mb-3 text-sm text-green-700 bg-green-50 border border-green-300 rounded p-2">{{ msg() }}</div>
    }
    @if (err()) {
    <div class="mb-3 text-sm text-red-600 bg-red-50 border border-red-300 rounded p-2">{{ err() }}</div>
    }

    <!-- Camera Scanner -->
    <div class="mb-4">
      @if (!scannerActive()) {
      <button (click)="startScanner()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">
        📷 Scan QR Code with Camera
      </button>
      } @else {
      <div class="flex flex-col items-center">
        <div class="w-72 border-2 border-blue-300 rounded-xl overflow-hidden shadow-md">
          <div id="qr-reader"></div>
        </div>
        <button (click)="stopScanner()"
          class="mt-3 px-6 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 rounded-lg transition text-sm">
          ✕ Close Camera
        </button>
      </div>
      }
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-4">
      <div class="flex-1 border-t border-gray-200"></div>
      <span class="text-xs text-gray-400 uppercase">or enter manually</span>
      <div class="flex-1 border-t border-gray-200"></div>
    </div>

    <!-- Manual Input -->
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">QR Token</label>
      <input [(ngModel)]="qrToken" type="text" placeholder="Paste token here"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <button (click)="punchIn()"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl text-lg transition shadow-lg">
      🟢 Punch In
    </button>
  </div>
  } @else {
  <div class="bg-green-50 rounded-xl shadow p-6 text-center">
    <p class="text-green-700 font-semibold text-lg">✅ You have already punched in today!</p>
  </div>
  }

</div>
